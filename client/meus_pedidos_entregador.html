<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minhas Entregas — JibLog</title>
    <link rel="icon" type="image/x-icon" href="logo.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <img src="logo.png" alt="logo JibLog">
    <h1>JibLog</h1>
</header>

<nav>
    <a href="index.html">Início</a>
    <a href="meus_pedidos_entregador.html">Minhas Entregas</a>
    <a href="conta.html" id="myaccount">Minha Área</a>
    <a id="logout" href="#" class="nav-logout">Logout</a>
</nav>

<main>
    <p class="section-title">Minha Região de Atuação</p>
    <div class="card" style="margin-bottom:28px">
        <div id="region-display" style="display:flex;align-items:center;justify-content:space-between;gap:16px">
            <p style="font-size:0.95rem">Região atual: <strong id="region-value">Carregando...</strong></p>
            <button class="btn btn-outline btn-sm" onclick="showRegionEdit()">Editar</button>
        </div>
        <div id="region-edit" style="display:none;margin-top:16px">
            <div class="form-group" style="margin-bottom:12px">
                <label for="region-input">Nova região</label>
                <input type="text" id="region-input" placeholder="Ex: São Paulo - SP">
            </div>
            <div style="display:flex;gap:8px">
                <button class="btn btn-primary btn-sm" onclick="updateRegion()">Salvar</button>
                <button class="btn btn-outline btn-sm" onclick="hideRegionEdit()">Cancelar</button>
            </div>
        </div>
    </div>

    <p class="section-title">Pedidos para Entrega</p>
    <div id="orders-list" class="order-list">
        <div class="loading">Carregando pedidos...</div>
    </div>

    <div style="margin-top:48px;padding-top:24px;border-top:1px solid var(--border)">
        <p class="section-title" style="color:#dc2626">Zona de Perigo</p>
        <button class="btn" style="background:#fee2e2;color:#dc2626" onclick="deleteAccount()">Excluir minha conta</button>
    </div>
</main>

<footer>
    <p>JibLog &copy; 2024</p>
</footer>

<script src="utils.js"></script>
<script>
    if (!isLoggedIn()) window.location.href = 'login.html';
    setupNav();

    async function loadPage() {
        try {
            const meRes = await fetch(`${API}/users/myAccount`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include'
            });
            if (!meRes.ok) { window.location.href = 'login.html'; return; }
            const me = await meRes.json();

            const allRes = await fetch(`${API}/deliverers/`, { credentials: 'include' });
            if (allRes.ok) {
                const deliverers = await allRes.json();
                const mine = deliverers.find(d => d.userId === me.id);
                if (mine) {
                    document.getElementById('region-value').textContent = mine.region;
                    document.getElementById('region-input').value = mine.region;
                }
            }
        } catch (_) {}

        loadOrders();
    }

    function showRegionEdit() {
        document.getElementById('region-display').querySelector('button').style.display = 'none';
        document.getElementById('region-edit').style.display = 'block';
    }

    function hideRegionEdit() {
        document.getElementById('region-display').querySelector('button').style.display = '';
        document.getElementById('region-edit').style.display = 'none';
    }

    async function updateRegion() {
        const region = document.getElementById('region-input').value.trim();
        if (!region) { showToast('Informe a região.', 'error'); return; }

        try {
            const res = await fetch(`${API}/deliverers/updateRegion`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ region })
            });
            if (res.ok) {
                document.getElementById('region-value').textContent = region;
                hideRegionEdit();
                showToast('Região atualizada com sucesso!');
            } else {
                const msg = await res.json();
                showToast(msg || 'Erro ao atualizar região.', 'error');
            }
        } catch (_) {
            showToast('Não foi possível conectar ao servidor.', 'error');
        }
    }

    async function updateStatus(code, newStatus) {
        try {
            const res = await fetch(`${API}/orders/${code}/status`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ status: newStatus })
            });
            if (res.ok) {
                showToast('Status atualizado!');
                loadOrders();
            } else {
                const msg = await res.json();
                showToast(msg || 'Erro ao atualizar status.', 'error');
            }
        } catch (_) {
            showToast('Não foi possível conectar ao servidor.', 'error');
        }
    }

    async function deleteAccount() {
        if (!confirm('Tem certeza que deseja excluir sua conta? Essa ação não pode ser desfeita.')) return;
        try {
            const res = await fetch(`${API}/deliverers/delete`, {
                method: 'DELETE',
                credentials: 'include'
            });
            if (res.ok) {
                document.cookie = 'jwt=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;';
                showToast('Conta excluída com sucesso.');
                setTimeout(() => { window.location.href = 'index.html'; }, 1500);
            } else {
                const msg = await res.json();
                showToast(msg || 'Erro ao excluir conta.', 'error');
            }
        } catch (_) {
            showToast('Não foi possível conectar ao servidor.', 'error');
        }
    }

    async function loadOrders() {
        const listEl = document.getElementById('orders-list');
        listEl.innerHTML = '<div class="loading">Carregando pedidos...</div>';
        try {
            const res = await fetch(`${API}/deliverers/myOrders`, { credentials: 'include' });
            if (!res.ok) { listEl.innerHTML = '<p style="color:var(--text-muted)">Erro ao carregar pedidos.</p>'; return; }
            const orders = await res.json();

            if (!orders.length) {
                listEl.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">🚚</div>
                        <p>Nenhum pedido atribuído a você ainda.</p>
                    </div>`;
                return;
            }

            const detailed = await Promise.all(orders.map(async order => {
                try {
                    const r = await fetch(`${API}/products/getById/${order.productId}`, { credentials: 'include' });
                    return { order, product: r.ok ? await r.json() : null };
                } catch (_) { return { order, product: null }; }
            }));

            listEl.innerHTML = detailed.map(({ order, product }) => {
                let actionBtn = '';
                if (order.status === 'CONFIRMADO') {
                    actionBtn = `<button class="btn btn-primary btn-sm" onclick="updateStatus('${order.code}', 'EM_ENTREGA')">Iniciar Entrega</button>`;
                } else if (order.status === 'EM_ENTREGA') {
                    actionBtn = `<button class="btn btn-outline btn-sm" onclick="updateStatus('${order.code}', 'ENTREGUE')">Confirmar Entrega</button>`;
                }

                return `
                    <div class="order-item">
                        <div class="order-item-info">
                            <h4>${product ? product.name : 'Produto #' + order.productId}</h4>
                            <div class="code">${order.code}</div>
                            <div class="meta">Pagamento: ${order.payment}</div>
                        </div>
                        <div class="order-item-right">
                            ${statusBadge(order.status)}
                            <span class="order-total">R$ ${Number(order.delivery).toFixed(2)}</span>
                            ${actionBtn}
                        </div>
                    </div>`;
            }).join('');
        } catch (_) {
            listEl.innerHTML = '<p style="color:var(--text-muted)">Erro ao carregar pedidos.</p>';
        }
    }

    loadPage();
</script>
</body>
</html>
