<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — JibLog</title>
    <link rel="icon" type="image/x-icon" href="logo.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <img src="logo.png" alt="logo JibLog">
    <h1>JibLog</h1>
</header>

<nav>
    <a href="index.html">Início</a>
    <a id="logout" href="#" class="nav-logout">Logout</a>
</nav>

<main class="centered">
    <div class="form-card">
        <h2 class="form-title">Entrar na conta</h2>

        <div id="error-msg" class="alert alert-error" style="display:none"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="seu@email.com" required>
            </div>
            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Entrar</button>
        </form>

        <a href="cadastro.html" class="form-link">Ainda não tem conta? Cadastre-se</a>
    </div>
</main>

<footer>
    <p>JibLog &copy; 2024</p>
</footer>

<script src="utils.js"></script>
<script>
    setupNav();

    // redireciona se já estiver logado
    if (isLoggedIn()) window.location.href = 'conta.html';

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const errorEl = document.getElementById('error-msg');
        errorEl.style.display = 'none';

        const email    = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        try {
            const res = await fetch(`${API}/users/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ email, password })
            });

            if (res.ok) {
                window.location.href = 'conta.html';
            } else {
                const msg = await res.json();
                errorEl.textContent = msg || 'Erro ao fazer login.';
                errorEl.style.display = 'block';
            }
        } catch (_) {
            errorEl.textContent = 'Não foi possível conectar ao servidor.';
            errorEl.style.display = 'block';
        }
    });
</script>
</body>
</html>
