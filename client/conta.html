<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Área — JibLog</title>
    <link rel="icon" type="image/x-icon" href="logo.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <img src="logo.png" alt="logo JibLog">
    <h1>JibLog</h1>
</header>

<nav>
    <a href="index.html">Início</a>
    <a id="myaccount" href="conta.html">Minha Área</a>
    <a id="action-link" href="#"></a>
    <a id="logout" href="#" class="nav-logout">Logout</a>
</nav>

<main>
    <div id="loading" class="loading">Carregando...</div>
    <div id="content" style="display:none">

        <!-- Perfil -->
        <div class="profile-card" id="profile-card"></div>

        <!-- Botão de ação -->
        <div style="margin-bottom: 28px">
            <a id="cta-btn" href="#" class="btn btn-primary"></a>
        </div>

        <!-- Pedidos do usuário (só aparece para role=user) -->
        <div id="orders-section" style="display:none">
            <p class="section-title">Meus Pedidos</p>
            <div id="orders-list" class="order-list">
                <div class="loading">Carregando pedidos...</div>
            </div>
        </div>

    </div>
</main>

<footer>
    <p>JibLog &copy; 2024</p>
</footer>

<script src="utils.js"></script>
<script>
    if (!isLoggedIn()) window.location.href = 'login.html';

    setupNav();

    async function loadPage() {
        let data;
        try {
            const res = await fetch(`${API}/users/myAccount`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include'
            });
            if (!res.ok) { window.location.href = 'login.html'; return; }
            data = await res.json();
        } catch (_) {
            window.location.href = 'login.html';
            return;
        }

        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').style.display = 'block';

        // Perfil
        const initial = data.name ? data.name[0].toUpperCase() : '?';
        document.getElementById('profile-card').innerHTML = `
            <div class="profile-avatar">${initial}</div>
            <div class="profile-info">
                <h2>${data.name}</h2>
                <p>${data.email}</p>
                <p style="margin-top:4px;font-size:0.8rem;color:var(--text-muted)">CEP: ${data.address}</p>
            </div>
            <span class="profile-role">${roleLabel(data.role)}</span>
        `;

        const ctaBtn     = document.getElementById('cta-btn');
        const actionLink = document.getElementById('action-link');

        if (data.role === 'owner') {
            ctaBtn.href      = 'cadastro_produto.html';
            ctaBtn.textContent = '+ Cadastrar Produto';
            actionLink.href  = 'meus_produtos_owner.html';
            actionLink.textContent = 'Meus Produtos';
        } else if (data.role === 'deliverer') {
            ctaBtn.href      = 'meus_pedidos_entregador.html';
            ctaBtn.textContent = 'Minhas Entregas';
            actionLink.href  = 'meus_pedidos_entregador.html';
            actionLink.textContent = 'Minhas Entregas';
        } else {
            ctaBtn.href      = 'fazer_pedido.html';
            ctaBtn.textContent = '+ Fazer Pedido';
            actionLink.href  = 'pedido.html';
            actionLink.textContent = 'Rastrear Pedido';
            document.getElementById('orders-section').style.display = 'block';
            loadOrders();
        }
    }

    async function loadOrders() {
        const listEl = document.getElementById('orders-list');
        try {
            const res = await fetch(`${API}/orders/order`, {
                method: 'GET',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include'
            });
            if (!res.ok) { listEl.innerHTML = '<p style="color:var(--text-muted)">Erro ao carregar pedidos.</p>'; return; }
            const orders = await res.json();

            if (!orders.length) {
                listEl.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📦</div>
                        <p>Você ainda não fez nenhum pedido.</p>
                        <a href="fazer_pedido.html" class="btn btn-primary">Fazer meu primeiro pedido</a>
                    </div>`;
                return;
            }

            // busca detalhes dos produtos em paralelo
            const detailed = await Promise.all(orders.map(async order => {
                try {
                    const r = await fetch(`${API}/products/getById/${order.productId}`, {
                        credentials: 'include'
                    });
                    const product = r.ok ? await r.json() : null;
                    return { order, product };
                } catch (_) {
                    return { order, product: null };
                }
            }));

            listEl.innerHTML = detailed.map(({ order, product }) => `
                <div class="order-item">
                    <div class="order-item-info">
                        <h4>${product ? product.name : 'Produto #' + order.productId}</h4>
                        <div class="code">${order.code}</div>
                        <div class="meta">Pagamento: ${order.payment}</div>
                    </div>
                    <div class="order-item-right">
                        ${statusBadge(order.status)}
                        <span class="order-total">R$ ${Number(order.delivery).toFixed(2)}</span>
                    </div>
                </div>
            `).join('');

        } catch (_) {
            listEl.innerHTML = '<p style="color:var(--text-muted)">Erro ao carregar pedidos.</p>';
        }
    }

    loadPage();
</script>
</body>
</html>
