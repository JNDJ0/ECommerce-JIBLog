<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Produto — JibLog</title>
    <link rel="icon" type="image/x-icon" href="logo.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <img src="logo.png" alt="logo JibLog">
    <h1>JibLog</h1>
</header>

<nav>
    <a href="index.html">Início</a>
    <a href="meus_produtos_owner.html">Meus Produtos</a>
    <a href="conta.html" id="myaccount">Minha Área</a>
    <a id="logout" href="#" class="nav-logout">Logout</a>
</nav>

<main class="centered">
    <div class="form-card" style="max-width:520px">
        <h2 class="form-title">Cadastrar produto</h2>

        <div id="error-msg" class="alert alert-error" style="display:none"></div>
        <div id="success-msg" class="alert alert-success" style="display:none"></div>

        <form id="productForm">
            <div class="form-group">
                <label for="name">Nome do produto</label>
                <input type="text" id="name" placeholder="Ex: Caixas de papelão" required>
            </div>
            <div class="form-group">
                <label for="description">Descrição</label>
                <input type="text" id="description" placeholder="Descreva o produto" required>
            </div>
            <div class="form-group">
                <label for="price">Preço (R$)</label>
                <input type="number" id="price" step="0.01" min="0" placeholder="0,00" required>
            </div>
            <div class="form-group">
                <label for="quantity">Quantidade em estoque</label>
                <input type="number" id="quantity" min="0" placeholder="0" required>
            </div>
            <div class="form-group">
                <label for="location">CEP de localização</label>
                <input type="text" id="location" placeholder="00000000" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Cadastrar produto</button>
        </form>
    </div>
</main>

<footer>
    <p>JibLog &copy; 2024</p>
</footer>

<script src="utils.js"></script>
<script>
    if (!isLoggedIn()) window.location.href = 'login.html';
    setupNav();

    document.getElementById('productForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const errorEl   = document.getElementById('error-msg');
        const successEl = document.getElementById('success-msg');
        errorEl.style.display = 'none';
        successEl.style.display = 'none';

        const data = {
            name:        document.getElementById('name').value,
            description: document.getElementById('description').value,
            price:       document.getElementById('price').value,
            quantity:    document.getElementById('quantity').value,
            location:    document.getElementById('location').value,
        };

        try {
            const res = await fetch(`${API}/products/create`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify(data)
            });

            if (res.ok) {
                successEl.textContent = 'Produto cadastrado com sucesso!';
                successEl.style.display = 'block';
                document.getElementById('productForm').reset();
                setTimeout(() => { window.location.href = 'meus_produtos_owner.html'; }, 1500);
            } else {
                const msg = await res.json();
                errorEl.textContent = msg || 'Erro ao cadastrar produto.';
                errorEl.style.display = 'block';
            }
        } catch (_) {
            errorEl.textContent = 'Não foi possível conectar ao servidor.';
            errorEl.style.display = 'block';
        }
    });
</script>
</body>
</html>
