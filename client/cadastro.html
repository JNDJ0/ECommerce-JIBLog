<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro — JibLog</title>
    <link rel="icon" type="image/x-icon" href="logo.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <img src="logo.png" alt="logo JibLog">
    <h1>JibLog</h1>
</header>

<nav>
    <a href="index.html">Início</a>
    <a href="login.html">Login</a>
</nav>

<main class="centered">
    <div class="form-card">
        <h2 class="form-title">Criar conta</h2>

        <div id="error-msg" class="alert alert-error" style="display:none"></div>
        <div id="success-msg" class="alert alert-success" style="display:none"></div>

        <form id="registerForm">
            <div class="form-group">
                <label for="name">Nome completo</label>
                <input type="text" id="name" placeholder="Seu nome" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="seu@email.com" required>
            </div>
            <div class="form-group">
                <label for="cep">CEP</label>
                <input type="number" id="cep" placeholder="00000000" required>
            </div>
            <div class="form-group">
                <label for="type">Tipo de conta</label>
                <select id="type" onchange="onTypeChange()">
                    <option value="user">Cliente</option>
                    <option value="owner">Proprietário de estabelecimento</option>
                    <option value="deliverer">Entregador</option>
                </select>
            </div>
            <div class="form-group" id="region-group" style="display:none">
                <label for="region">Região de atuação</label>
                <input type="text" id="region" placeholder="Ex: São Paulo - SP">
            </div>
            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <div class="form-group">
                <label for="password-confirm">Confirmar senha</label>
                <input type="password" id="password-confirm" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Cadastrar</button>
        </form>

        <a href="login.html" class="form-link">Já tem conta? Faça login</a>
    </div>
</main>

<footer>
    <p>JibLog &copy; 2024</p>
</footer>

<script src="utils.js"></script>
<script>
    function onTypeChange() {
        const role = document.getElementById('type').value;
        document.getElementById('region-group').style.display = role === 'deliverer' ? 'block' : 'none';
    }

    document.getElementById('registerForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const errorEl   = document.getElementById('error-msg');
        const successEl = document.getElementById('success-msg');
        errorEl.style.display = 'none';
        successEl.style.display = 'none';

        const name     = document.getElementById('name').value;
        const email    = document.getElementById('email').value;
        const address  = document.getElementById('cep').value;
        const role     = document.getElementById('type').value;
        const password = document.getElementById('password').value;
        const confirm  = document.getElementById('password-confirm').value;
        const region   = document.getElementById('region').value.trim();

        if (password !== confirm) {
            errorEl.textContent = 'As senhas não coincidem.';
            errorEl.style.display = 'block';
            return;
        }

        if (role === 'deliverer' && !region) {
            errorEl.textContent = 'Informe a região de atuação.';
            errorEl.style.display = 'block';
            return;
        }

        const url = role === 'owner'
            ? `${API}/owners/create`
            : role === 'deliverer'
                ? `${API}/deliverers/create`
                : `${API}/users/create`;

        const body = { name, email, address, password };
        if (role === 'deliverer') body.region = region;

        try {
            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify(body)
            });

            if (res.ok) {
                successEl.textContent = 'Cadastro realizado! Redirecionando para o login...';
                successEl.style.display = 'block';
                setTimeout(() => { window.location.href = 'login.html'; }, 1500);
            } else {
                const msg = await res.json();
                errorEl.textContent = msg || 'Erro ao realizar cadastro.';
                errorEl.style.display = 'block';
            }
        } catch (_) {
            errorEl.textContent = 'Não foi possível conectar ao servidor.';
            errorEl.style.display = 'block';
        }
    });
</script>
</body>
</html>
