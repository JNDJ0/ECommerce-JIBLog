<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento — JibLog</title>
    <link rel="icon" type="image/x-icon" href="logo.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <img src="logo.png" alt="logo JibLog">
    <h1>JibLog</h1>
</header>

<nav>
    <a href="index.html">Início</a>
    <a href="fazer_pedido.html">Produtos</a>
    <a href="pedido.html" id="myorders">Meus Pedidos</a>
    <a href="conta.html" id="myaccount">Minha Área</a>
    <a id="logout" href="#" class="nav-logout">Logout</a>
</nav>

<main class="centered">
    <div style="width:100%;max-width:520px">
        <div id="product-info" class="card" style="margin-bottom:20px">
            <div class="loading">Carregando produto...</div>
        </div>

        <div class="card">
            <p class="card-title">Escolha o método de pagamento</p>
            <div id="payment-options" class="payment-grid">
                <button class="payment-option" onclick="placeOrder('Dinheiro')">
                    <span class="payment-icon">💵</span>Dinheiro
                </button>
                <button class="payment-option" onclick="placeOrder('Cartão')">
                    <span class="payment-icon">💳</span>Cartão
                </button>
                <button class="payment-option" onclick="placeOrder('Pix')">
                    <span class="payment-icon">⚡</span>Pix
                </button>
            </div>
            <div id="error-msg" class="alert alert-error" style="display:none;margin-top:16px"></div>
        </div>
    </div>
</main>

<footer>
    <p>JibLog &copy; 2024</p>
</footer>

<script src="utils.js"></script>
<script>
    if (!isLoggedIn()) window.location.href = 'login.html';
    setupNav();

    const params    = new URLSearchParams(window.location.search);
    const productId = params.get('productId');

    if (!productId) {
        document.getElementById('product-info').innerHTML = '<p class="alert alert-error">Nenhum produto selecionado.</p>';
        document.getElementById('payment-options').style.display = 'none';
    } else {
        fetch(`${API}/products/getById/${productId}`, { credentials: 'include' })
            .then(r => r.ok ? r.json() : null)
            .then(p => {
                if (!p) { document.getElementById('product-info').innerHTML = '<p>Produto não encontrado.</p>'; return; }
                document.getElementById('product-info').innerHTML = `
                    <p class="card-title">Resumo do pedido</p>
                    <p style="font-weight:700;font-size:1rem">${p.name}</p>
                    <p style="font-size:0.875rem;color:var(--text-muted);margin-top:4px">${p.description}</p>
                    <p style="margin-top:12px;font-size:0.9rem">Produto: <strong>R$ ${Number(p.price).toFixed(2)}</strong></p>
                    <p style="font-size:0.9rem">Taxa de entrega: <strong>R$ 20,00</strong></p>
                    <p style="font-size:1rem;font-weight:700;color:var(--primary);margin-top:8px">
                        Total: R$ ${(Number(p.price) + 20).toFixed(2)}
                    </p>
                `;
            });
    }

    async function placeOrder(paymentMethod) {
        const errorEl = document.getElementById('error-msg');
        errorEl.style.display = 'none';

        if (!productId) return;

        try {
            const res = await fetch(`${API}/orders/create`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ productId, payment: paymentMethod })
            });

            if (res.ok) {
                showToast('Pedido realizado com sucesso!');
                setTimeout(() => { window.location.href = 'pedido.html'; }, 1500);
            } else {
                const msg = await res.json();
                errorEl.textContent = msg || 'Erro ao realizar pedido.';
                errorEl.style.display = 'block';
            }
        } catch (_) {
            errorEl.textContent = 'Não foi possível conectar ao servidor.';
            errorEl.style.display = 'block';
        }
    }
</script>
</body>
</html>
