<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Produtos — JibLog</title>
    <link rel="icon" type="image/x-icon" href="logo.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <img src="logo.png" alt="logo JibLog">
    <h1>JibLog</h1>
</header>

<nav>
    <a href="index.html">Início</a>
    <a href="meus_produtos_owner.html">Meus Produtos</a>
    <a href="cadastro_produto.html">+ Cadastrar Produto</a>
    <a href="conta.html" id="myaccount">Minha Área</a>
    <a id="logout" href="#" class="nav-logout">Logout</a>
</nav>

<main>
    <p class="section-title">Meus Produtos</p>
    <div id="product-list" class="product-grid">
        <div class="loading">Carregando produtos...</div>
    </div>
</main>

<footer>
    <p>JibLog &copy; 2024</p>
</footer>

<script src="utils.js"></script>
<script>
    if (!isLoggedIn()) window.location.href = 'login.html';
    setupNav();

    async function loadProducts() {
        const listEl = document.getElementById('product-list');
        try {
            const res = await fetch(`${API}/products/product`, {
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include'
            });
            if (!res.ok) throw new Error();
            const products = await res.json();

            if (!products.length) {
                listEl.innerHTML = `
                    <div class="empty-state" style="grid-column:1/-1">
                        <div class="icon">📦</div>
                        <p>Você ainda não cadastrou nenhum produto.</p>
                        <a href="cadastro_produto.html" class="btn btn-primary">Cadastrar primeiro produto</a>
                    </div>`;
                return;
            }

            listEl.innerHTML = products.map(p => `
                <div class="product-card">
                    <h4>${p.name}</h4>
                    <p class="desc">${p.description}</p>
                    <p class="stock">Estoque: <strong>${p.quantity}</strong></p>
                    <p class="price">R$ ${Number(p.price).toFixed(2)}</p>
                    <p style="font-size:0.8rem;color:var(--text-muted);margin-top:4px">CEP: ${p.location}</p>
                </div>
            `).join('');
        } catch (_) {
            listEl.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><p>Erro ao carregar produtos.</p></div>';
        }
    }

    loadProducts();
</script>
</body>
</html>
